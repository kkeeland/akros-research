events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream servers
    upstream storefront {
        server storefront:8000;
    }

    upstream medusa {
        server medusa:9000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name akroresearch.com api.akroresearch.com admin.akroresearch.com;
        return 301 https://$server_name$request_uri;
    }

    # Main storefront
    server {
        listen 443 ssl;
        server_name akroresearch.com;

        ssl_certificate /etc/letsencrypt/live/akroresearch.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/akroresearch.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        limit_req zone=general burst=20 nodelay;

        location / {
            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Medusa API
    server {
        listen 443 ssl;
        server_name api.akroresearch.com;

        ssl_certificate /etc/letsencrypt/live/akroresearch.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/akroresearch.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        limit_req zone=api burst=50 nodelay;

        client_max_body_size 10m;

        location / {
            proxy_pass http://medusa;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Medusa Admin
    server {
        listen 443 ssl;
        server_name admin.akroresearch.com;

        ssl_certificate /etc/letsencrypt/live/akroresearch.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/akroresearch.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Restrict admin access (add your IP ranges)
        # allow 1.2.3.4;
        # deny all;

        location / {
            proxy_pass http://medusa;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
